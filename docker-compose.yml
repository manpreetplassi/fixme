services:
  db:
    image: postgres:15-alpine
    container_name: fixme-db
    environment:
      POSTGRES_DB: fixme_db
      POSTGRES_USER: fixme_user
      POSTGRES_PASSWORD: fixme_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixme_user -d fixme_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

